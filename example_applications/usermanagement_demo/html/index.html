<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<meta name="description" content="Pict Section UserManagement — interactive demo">

		<title>Pict User Management — Demo</title>

		<link href="css/usermanagement-demo.css" rel="stylesheet">
		<style id="PICT-CSS"></style>

		<script src="js/pict.min.js" type="text/javascript"></script>
	</head>
	<body>
		<!-- Application root container -->
		<div id="UserMgmtDemo-Application-Container"></div>

		<!-- Compiled application bundle (produced by `npm run build`) -->
		<script src="./pict-section-usermanagement-demo.min.js" type="text/javascript"></script>

		<!-- Boot — runs after both bundles have loaded so Pict and
		     PictSectionUserManagementDemo are guaranteed to exist. -->
		<script type="text/javascript">
		Pict.safeOnDocumentReady(() =>
			{
				Pict.safeLoadPictApplication(PictSectionUserManagementDemo, 2);
			});
		</script>
	</body>
</html>
